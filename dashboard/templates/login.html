<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AI-NIDS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0c10;
      margin: 0;
      overflow: hidden;
    }

    .login-container {
      width: 400px;
      padding: 40px;
      background: #191b22;
      border: 1px solid #2d313d;
      border-radius: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      font-size: 32px;
      font-weight: 800;
      color: #00f59b;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .login-subtitle {
      color: #8b949e;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      background: #0b0c10;
      border: 1px solid #2d313d;
      border-radius: 6px;
      padding: 12px 16px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #00f59b;
      box-shadow: 0 0 0 2px rgba(0, 245, 155, 0.1);
    }

    .btn-login {
      width: 100%;
      background: #00f59b;
      color: #0b0c10;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .btn-login:hover {
      background: #00d688;
      transform: translateY(-1px);
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 24px;
      border: 1px solid rgba(255, 77, 77, 0.2);
      display: none;
    }

    .login-footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #484f58;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">AI-NIDS</div>
      <div class="login-subtitle">Intrusion Detection System Dashboard</div>
    </div>

    {% if error %}
    <div class="error-msg" style="display: block;">
      {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="admin" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-footer">
      &copy; 2026 AI-NIDS Orchestrator. All rights reserved.
    </div>
  </div>

</body>
</html>
